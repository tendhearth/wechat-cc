name: Desktop Build

# Three-platform Tauri build matrix. Verifies the desktop app compiles on
# Linux / macOS / Windows and uploads each runner's bundle artefacts so we
# can sanity-check installers without spinning up the actual platforms.
#
# Trigger:
#   - manual (Actions tab → Run workflow)
#   - push to a tag matching desktop-v*  (e.g. desktop-v0.1.0)

on:
  workflow_dispatch: {}
  push:
    tags:
      - 'desktop-v*'

jobs:
  build:
    name: build · ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            label: linux-x86_64
            bun_target: bun-linux-x64
            rust_triple: x86_64-unknown-linux-gnu
          # macOS Apple Silicon (M1/M2/M3) — `macos-latest` runners are M-series
          - os: macos-latest
            label: macos-aarch64
            bun_target: bun-darwin-arm64
            rust_triple: aarch64-apple-darwin
          # macOS Intel skipped: macos-13 runners queue indefinitely on the
          # free public-repo tier (33+ min and never picked up at v0.3.0
          # cut time). Intel users have to use the source-mode CLI for
          # now. Revisit when GH's macos-13 capacity recovers, or once
          # cross-compile from macos-latest aarch64 → x64 is viable in
          # `bun build --compile`.
          # Windows x86_64
          - os: windows-latest
            label: windows-x86_64
            bun_target: bun-windows-x64
            rust_triple: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Pull the first-party wxvault plugin (private repo) into plugins/ so
      # tauri.conf's `resources: ["../../../plugins/"]` bundles it into the app.
      # Shell-guarded on the token (not an `if:` on secrets, which the Actions
      # context doesn't allow) so forks/PRs without the secret still build —
      # just without the bundled plugin. .git is dropped so it isn't bundled.
      - name: Bundle first-party wxvault plugin (private)
        shell: bash
        env:
          WXVAULT_PAT: ${{ secrets.RELEASE_PAT_WECHAT_CC }}
        run: |
          if [ -z "${WXVAULT_PAT}" ]; then
            if [[ "${GITHUB_REF}" == refs/tags/desktop-v* ]]; then
              echo "::error::RELEASE_PAT_WECHAT_CC is required for desktop releases; refusing to publish an installer without wxvault"
              exit 1
            fi
            echo "::notice::no RELEASE_PAT_WECHAT_CC — validation build will omit bundled wxvault"
            exit 0
          fi
          rm -rf plugins/wxvault
          git clone --depth 1 "https://x-access-token:${WXVAULT_PAT}@github.com/tendhearth/wxvault.git" plugins/wxvault
          rm -rf plugins/wxvault/.git
          test -f plugins/wxvault/wechat-cc.plugin.json
          echo "bundled wxvault ($(ls plugins/wxvault | wc -l | tr -d ' ') files)"

      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            librsvg2-dev \
            libssl-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            file \
            build-essential \
            pkg-config \
            libfuse2
          # libfuse2 is required by linuxdeploy / AppImage runtime (it mounts
          # the AppImage as a fuse filesystem during bundling). Newer Ubuntu
          # images dropped fuse2 by default; without this the AppImage step
          # fails with an opaque "failed to run linuxdeploy" message.

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ matrix.os }}-${{ hashFiles('apps/desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-${{ matrix.os }}-

      - name: Cache Tauri target
        uses: actions/cache@v4
        with:
          path: apps/desktop/src-tauri/target
          key: tauri-target-${{ matrix.os }}-${{ hashFiles('apps/desktop/src-tauri/Cargo.lock', 'apps/desktop/src-tauri/src/**', 'apps/desktop/src-tauri/build.rs') }}
          restore-keys: |
            tauri-target-${{ matrix.os }}-

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install desktop deps
        working-directory: apps/desktop
        run: bun install --frozen-lockfile

      - name: Install root deps (for vitest)
        run: bun install --frozen-lockfile

      - name: Run vitest (touched suites only)
        # Force bash shell — git-for-Windows ships it, and PowerShell doesn't
        # honor the trailing-backslash line continuations we use below, which
        # would silently invoke `vitest run` with no file args and then try to
        # execute `cli.test.ts` as a separate command.
        # apps/desktop/shim.e2e.test.ts is gated to non-Windows: it spawns
        # `bun apps/desktop/test-shim.ts` and the shim's `bun cli.ts` paths
        # fight Git Bash quoting on the Windows runner — verified locally,
        # not worth a Windows-specific shim port for this Tier-1 smoke.
        shell: bash
        # `bun --bun` forces Bun's runtime for the test process so vitest can
        # resolve `bun:sqlite` (used by src/lib/db.ts via doctor.ts since v0.5.1).
        # `bun x vitest` alone spawns workers via Node, which can't import bun:*.
        run: |
          bun --bun vitest run \
            cli.test.ts \
            agent-config.test.ts \
            doctor.test.ts \
            account-remove.test.ts \
            daemon-kill.test.ts \
            memory.test.ts \
            runtime-info.test.ts \
            update.test.ts \
            update.e2e.test.ts \
            src/daemon/onboarding.test.ts \
            apps/desktop/src/view.test.ts \
            $(if [ "$RUNNER_OS" != "Windows" ]; then echo apps/desktop/shim.e2e.test.ts; fi)

      # Compile cli.ts to a self-contained native sidecar that Tauri bundles
      # into the .app/.exe/.deb. This is what makes the desktop install
      # actually self-contained — no system Bun, no cloned wechat-cc source,
      # no PATH lookup. The host OS compiles for its own architecture; cross
      # builds are deliberately not attempted (each runner ships one platform).
      #
      # macOS quirk: bun-compiled binaries are not Mach-O codesign-compatible
      # out of the box (see bun-build's known issue) — we strip the embedded
      # signature, clear quarantine xattrs, and re-sign ad-hoc so the runtime
      # passes Gatekeeper. Tauri's bundle step re-signs everything together
      # later with APPLE_SIGNING_IDENTITY=- (also ad-hoc), which is fine.
      # Sidecar compile — matrix.bun_target picks the bun cross-target,
      # matrix.rust_triple is the suffix Tauri's externalBin loader expects.
      # Linux/macOS use no extension; Windows needs `.exe`. macOS additionally
      # needs xattr/codesign massaging because bun-compiled binaries aren't
      # codesign-compatible out of the box (Tauri's bundle step then re-signs
      # everything ad-hoc with APPLE_SIGNING_IDENTITY=-).
      - name: Compile sidecar (Linux)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          mkdir -p apps/desktop/src-tauri/binaries
          bun build --compile --target=${{ matrix.bun_target }} cli.ts \
            --outfile apps/desktop/src-tauri/binaries/wechat-cc-cli-${{ matrix.rust_triple }}
          chmod +x apps/desktop/src-tauri/binaries/wechat-cc-cli-${{ matrix.rust_triple }}
          ls -lh apps/desktop/src-tauri/binaries/

      - name: Compile sidecar (macOS)
        if: startsWith(matrix.os, 'macos')
        shell: bash
        run: |
          mkdir -p apps/desktop/src-tauri/binaries
          OUT=apps/desktop/src-tauri/binaries/wechat-cc-cli-${{ matrix.rust_triple }}
          bun build --compile --target=${{ matrix.bun_target }} cli.ts --outfile "$OUT"
          xattr -cr "$OUT" || true
          codesign --remove-signature "$OUT" || true
          codesign --force --sign - --identifier=dev.wechat-cc.cli "$OUT"
          ls -lh apps/desktop/src-tauri/binaries/

      - name: Compile sidecar (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        # --windows-hide-console is supposed to ship a GUI-subsystem PE
        # so ScheduledTask doesn't pop a console alongside the daemon
        # (users see a CMD they didn't open, can accidentally close it,
        # the wizard's "background service" promise falls apart). Daemon
        # dual-writes logs to <stateDir>/channel.log so losing stderr is
        # fine.
        #
        # **Bun 1.3.x bug**: `--windows-hide-console` is documented in
        # `bun build --help` and accepted silently, but the resulting
        # binary still ships PE subsystem=3 (CONSOLE). Verified locally
        # 2026-05-05 against bun 1.3.13 + on the windows-latest runner.
        # The post-process step below flips the byte by hand.
        # See "Hide console" step.
        run: |
          mkdir -p apps/desktop/src-tauri/binaries
          bun build --compile --windows-hide-console --target=${{ matrix.bun_target }} cli.ts \
            --outfile apps/desktop/src-tauri/binaries/wechat-cc-cli-${{ matrix.rust_triple }}.exe
          ls -lh apps/desktop/src-tauri/binaries/

      # PE-subsystem flip — workaround for the Bun bug noted above.
      # IMAGE_DOS_HEADER.e_lfanew (offset 0x3c) → IMAGE_NT_HEADERS at
      # peOff. IMAGE_OPTIONAL_HEADER.Subsystem lives at peOff+0x5c
      # (a UInt16; PE32 and PE32+ both keep it at the same offset since
      # the optional header layout is identical up through the data
      # directories). We assert the byte is 3 (IMAGE_SUBSYSTEM_WINDOWS_CUI)
      # before flipping to 2 (IMAGE_SUBSYSTEM_WINDOWS_GUI) — read-after-
      # write verifies the flip persisted. Either invariant failing
      # fails the build loudly so a future Bun fix doesn't silently
      # double-flip.
      - name: Hide console on Windows sidecar (workaround for Bun --windows-hide-console no-op)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $path = 'apps/desktop/src-tauri/binaries/wechat-cc-cli-${{ matrix.rust_triple }}.exe'
          $bytes = [System.IO.File]::ReadAllBytes($path)
          $peOff = [BitConverter]::ToInt32($bytes, 0x3c)
          $before = [BitConverter]::ToUInt16($bytes, $peOff + 0x5c)
          if ($before -ne 3) {
            Write-Error "expected PE subsystem=3 (CONSOLE) before flip, got $before — Bun may have fixed --windows-hide-console; remove this workaround"
            exit 1
          }
          $bytes[$peOff + 0x5c] = 2
          $bytes[$peOff + 0x5d] = 0
          [System.IO.File]::WriteAllBytes($path, $bytes)
          $verify = [System.IO.File]::ReadAllBytes($path)
          $after = [BitConverter]::ToUInt16($verify, $peOff + 0x5c)
          if ($after -ne 2) {
            Write-Error "PE subsystem flip failed: still $after after write"
            exit 1
          }
          Write-Output "PE subsystem flipped: $before -> $after (now GUI/hidden)"

      - name: Tauri build
        working-directory: apps/desktop
        run: bun run tauri build
        env:
          # Use ad-hoc signing on macOS ("-" tells codesign to sign with an
          # ephemeral identity instead of looking for a Developer ID in the
          # keychain). This produces a runnable .app/.dmg without requiring
          # Apple Developer credentials in CI. Setting this to '' makes Tauri
          # fall through to default signing which fails when no identity is
          # provisioned.
          APPLE_SIGNING_IDENTITY: '-'

      - name: Upload bundle artefacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wechat-cc-${{ matrix.label }}
          # actions/upload-artifact uses @actions/glob, which does NOT expand
          # `{a,b,c}` brace patterns — earlier `bundle/{dmg,macos}/*` matched
          # zero files. Listing each subdir on its own line is the supported
          # multi-path syntax. Only the subset relevant to each platform exists
          # at runtime; the rest are silently ignored.
          path: |
            apps/desktop/src-tauri/target/release/bundle/dmg/*
            apps/desktop/src-tauri/target/release/bundle/macos/*.app.tar.gz
            apps/desktop/src-tauri/target/release/bundle/nsis/*
            apps/desktop/src-tauri/target/release/bundle/msi/*
            apps/desktop/src-tauri/target/release/bundle/deb/*
            apps/desktop/src-tauri/target/release/bundle/appimage/*
            apps/desktop/src-tauri/target/release/bundle/rpm/*
          if-no-files-found: warn
          retention-days: 14

  # Aggregate the three platform bundles into a single GitHub Release.
  # Only runs on `desktop-v*` tag pushes (skipped on workflow_dispatch / non-tag
  # runs since those are validation builds without a meaningful version).
  # Creates the release as a *draft* — review notes + flip to published manually.
  release:
    name: Draft GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/desktop-v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout (for release notes file)
        uses: actions/checkout@v4

      - name: Download all platform bundles
        uses: actions/download-artifact@v4
        with:
          path: bundles
          pattern: wechat-cc-*
          merge-multiple: false

      - name: Flatten bundles for upload
        run: |
          mkdir -p release-files
          find bundles -type f \( -name '*.dmg' -o -name '*.app.tar.gz' -o -name '*.deb' -o -name '*.AppImage' -o -name '*.rpm' -o -name '*.exe' -o -name '*.msi' -o -name '*.nsis.zip' \) -exec cp -v {} release-files/ \;
          ls -la release-files

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: Desktop ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body_path: docs/releases/${{ github.ref_name }}.md
          files: release-files/*
          fail_on_unmatched_files: false

  e2e-browser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - working-directory: apps/desktop
        run: |
          bun install
          bunx playwright install chromium --with-deps
          bun run test:e2e:browser
