name: CI

on:
  push:
    # `dev` is included so the essential gate (typecheck + unit tests + build)
    # runs on the integration branch too — it sat uncovered while 91 commits
    # piled up, which is how type errors accumulated unnoticed. The heavy e2e
    # jobs below stay master/PR-only to keep routine dev pushes fast.
    branches: [master, dev]
  pull_request:
    branches: [master]

jobs:
  build:
    name: build · ${{ matrix.os }}
    strategy:
      # Let every platform complete so we can see which ones break at a
      # glance instead of the first failure cancelling the rest.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Module-boundary check
        # Fast layer-violation guard. Runs only on linux to keep matrix
        # parallelism cheap — the rules are platform-independent.
        if: matrix.os == 'ubuntu-latest'
        run: bun run depcheck

      - name: Build cli.ts
        run: bun build cli.ts --target=node --outfile=dist/cli.js

      - name: Build docs.ts
        run: bun build docs.ts --target=node --outfile=dist/docs.js

      - name: Build setup.ts
        run: bun build setup.ts --target=node --outfile=dist/setup.js

      - name: Build log-viewer.ts
        run: bun build log-viewer.ts --target=node --outfile=dist/log-viewer.js

      - name: Compiled-sidecar smoke
        # Proves guardrail #1 (compiled sidecar delegates LLM memory ops to
        # the daemon instead of inline-spawning claude, which crashes under
        # bunfs) against a real `bun build --compile` artifact, not just
        # source-mode unit tests. Linux-only to keep matrix parallelism cheap
        # — the guardrail logic is platform-independent.
        if: matrix.os == 'ubuntu-latest'
        run: bun scripts/smoke-compiled-sidecar.ts

      - name: Run tests
        # `bun run test` invokes `bun --bun vitest run` per package.json
        # (PR7 — vitest needs Bun's runtime to resolve `bun:sqlite`).
        run: bun run test

  e2e:
    # Heavy suite — skip on direct dev pushes; still runs on master pushes and
    # on every PR (where base is master).
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun --bun vitest run -c vitest.e2e.config.ts

  desktop-e2e:
    # Desktop GUI Playwright suite (apps/desktop) — wizard, dashboard panes,
    # CSP, attachment path-guard. The spec fixture spawns its own DRY_RUN
    # test-shim on :4174, and playwright.config.ts defaults CSP injection on,
    # so this runs headless with no extra wiring beyond a chromium install.
    # Heavy suite — master/PR only (skipped on direct dev pushes).
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Install Playwright Chromium
        working-directory: apps/desktop
        run: bun x playwright install --with-deps chromium
      - name: Desktop e2e (Playwright)
        working-directory: apps/desktop
        run: bun x playwright test
